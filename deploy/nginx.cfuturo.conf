server {
  listen 80;
  server_name _;

  root /var/www/cfuturo/client/dist;
  index index.html;

  client_max_body_size 25M;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=(), browsing-topics=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; manifest-src 'self'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; style-src-elem 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://pay.ebi.com.gt https://link.ebi.com.gt https://www.youtube.com https://player.vimeo.com; media-src 'self' blob: data: https:; worker-src 'self' blob:; upgrade-insecure-requests" always;
  # HSTS agregalo solo cuando habilites HTTPS/443 para no forzar HTTP inseguro.

  location /api/ {
    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
